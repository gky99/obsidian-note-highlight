name: Release

# Auto-publish a GitHub Release when manifest.json's version is bumped.
# Bump the "version" in manifest.json (and versions.json), commit, push to master
# — this builds the plugin and publishes a release tagged with that exact version,
# carrying the three assets Obsidian needs: main.js, manifest.json, styles.css.
# The tag MUST equal the manifest version verbatim (no "v" prefix) or Obsidian
# and BRAT won't recognize the release.

on:
  push:
    branches: [master]
    paths: ['manifest.json']
  workflow_dispatch: {} # allow a manual re-run for the current manifest version

permissions:
  contents: write # create the tag + release

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # full history + tags, so the "already released?" gate is accurate

      - name: Read plugin version
        id: meta
        run: |
          version="$(jq -r .version manifest.json)"
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "manifest.json version: $version"

      - name: Skip if this version is already released
        id: gate
        env:
          VERSION: ${{ steps.meta.outputs.version }}
        run: |
          if git rev-parse -q --verify "refs/tags/$VERSION" >/dev/null; then
            echo "Tag $VERSION already exists — nothing to release."
            echo "release=false" >> "$GITHUB_OUTPUT"
          else
            echo "release=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Setup pnpm
        if: steps.gate.outputs.release == 'true'
        uses: pnpm/action-setup@v4
        with:
          version: 11 # local toolchain is pnpm 11; build approvals live in pnpm-workspace.yaml

      - name: Setup Node
        if: steps.gate.outputs.release == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        if: steps.gate.outputs.release == 'true'
        run: pnpm install --frozen-lockfile

      - name: Test
        if: steps.gate.outputs.release == 'true'
        run: pnpm test

      - name: Build
        if: steps.gate.outputs.release == 'true'
        run: pnpm build # tsc --noEmit && vite build → emits main.js at repo root

      - name: Publish GitHub release
        if: steps.gate.outputs.release == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ steps.meta.outputs.version }}
        run: |
          gh release create "$VERSION" \
            --title "$VERSION" \
            --generate-notes \
            --target "$GITHUB_SHA" \
            main.js manifest.json styles.css
